<!DOCTYPE html>
	<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">

		<style>
		body {
			padding: 20px;
		}

		.grid {
			column-count: 3;
			column-gap: 20px;
			max-width: 1600px;
			margin: 0 auto;
		}

		img {
			width: 100%;
			height: auto;
			border-radius: 8px;
			display: block;
			margin-bottom: 20px;
			break-inside: avoid;
		}

		@media (min-width: 1200px) {
			.grid {
				column-count: 3;
				column-gap: 25px;
				max-width: 1600px;
			}
		}

		/* Optional: adjust columns for smaller screens */
		@media (max-width: 768px) {
			.grid {
				column-count: 2;
				column-gap: 15px;
			}
		}
		</style>
	</head>
	<body>
		<div class="grid">
			<img src="images/gallery/camus.png" class="landscape" alt="">
        <img src="images/gallery/fairyfolk1.png" class="landscape" alt="">
        <img src="images/gallery/fairyfolk2.png" class="landscape" alt="">
        <img src="images/gallery/fairyfolk3.png" class="landscape" alt="">
        <img src="images/gallery/fairyfolk4.png" class="landscape" alt="">
        <img src="images/gallery/fairyfolk5.png" class="landscape" alt="">
        <img src="images/gallery/personalcollection1.png" class="landscape" alt="">
        <img src="images/gallery/personalcollection2.png" class="landscape" alt="">
        <img src="images/gallery/personalcollection3.png" class="landscape" alt="">
        <img src="images/gallery/personalcollection4.png" class="landscape" alt="">
		</div>
	</body>
	</html>
